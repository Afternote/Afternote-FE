name: Review Assign
on:
  pull_request:
    types: [ opened, ready_for_review ]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: hkusu/review-assign-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: ${{ github.actor }}
          reviewers: 1hyok, koongmai, Sadturtleman