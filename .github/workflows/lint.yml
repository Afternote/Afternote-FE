name: Static Analysis (Reviewdog)

permissions:
  contents: read
  pull-requests: write # PR에 댓글을 쓰기 위한 필수 권한

on:
  pull_request:
    branches: [main, develop]

jobs:
  # 1. Ktlint: checkstyle 형식으로 출력하여 Reviewdog에 전달
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run Ktlint with Reviewdog
        uses: reviewdog/action-ktlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review # PR 리뷰 댓글로 달기
          level: error
          ktlint_flags: "--android" # Android 스타일 가이드 준수

  # 2. Android Lint: XML 리포트를 파싱하여 Reviewdog에 전달
  android-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run Android Lint
        # 모든 모듈의 린트를 실행 (XML 리포트 생성)
        run: ./gradlew lintDebug --continue --parallel

      - name: Android Lint Reporter (Reviewdog)
        uses: reviewdog/action-android-lint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning # Warning 이상은 모두 댓글로 표시
          pattern: "**/lint-results-debug.xml" # 멀티 모듈 리포트 전체 탐색